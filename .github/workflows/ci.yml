name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Test Suite
    permissions:
      contents: read
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Verify TypeScript compilation
      run: npm run compile

    - name: Validate sample assets
      run: npm run validate:samples

    - name: Run unit tests
      run: npm test
      env:
        NODE_ENV: test
    
    - name: Generate test coverage
      run: npm run test:coverage
    
    - name: Upload coverage to Codecov
      if: matrix.node-version == '20.x'
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

  dsl-plan:
    name: DSL Plan (PR)
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build CLI
      run: npm run compile

    - name: Fetch base branch
      run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

    - name: Run TextUI plan summary
      run: node ./scripts/plan-pr-diff.cjs --base-ref "origin/${{ github.base_ref }}" --summary-file ".tmp-plan/summary.md" --json-file ".tmp-plan/result.json"

    - name: Publish plan summary
      run: node -e "const fs=require('fs');process.stdout.write(fs.readFileSync('.tmp-plan/summary.md','utf8'))" >> "$GITHUB_STEP_SUMMARY"

    - name: Build PR comment body
      run: |
        node -e "const fs=require('fs');const marker='<!-- textui-plan-summary -->';const body=[marker,'## TextUI DSL Plan（自動更新）','',fs.readFileSync('.tmp-plan/summary.md','utf8')].join('\n');fs.writeFileSync('.tmp-plan/pr-comment.md',body);"

    - name: Upsert PR comment
      if: always()
      uses: actions/github-script@v7
      continue-on-error: true
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- textui-plan-summary -->';
          const body = fs.readFileSync('.tmp-plan/pr-comment.md', 'utf8');
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100
          });

          const existing = comments.find(comment =>
            comment.user?.type === 'Bot' && typeof comment.body === 'string' && comment.body.includes(marker)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
          }

    - name: Upload plan artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: textui-plan-summary
        path: .tmp-plan
        retention-days: 14

  lint:
    name: Lint & Format Check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npm run lint
    
    - name: Check code formatting
      run: npm run format:check

  build:
    name: Build Extension
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build extension
      run: npm run compile
    
    - name: Package extension
      run: npm run package
    
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: vscode-extension
        path: '*.vsix'
        retention-days: 30

  integration:
    name: Integration Tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Build extension sources
      run: npm run build
    
    - name: Setup Xvfb (for headless VS Code)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
    
    - name: Run integration tests
      run: xvfb-run -a npm run test:integration
      env:
        NODE_ENV: test
