name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  code-metrics:
    name: Code metrics
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install cloc
      run: |
        sudo apt-get update
        sudo apt-get install -y cloc

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Collect code metrics
      run: npm run metrics:collect

    - name: Check SSoT regression threshold
      run: npm run metrics:check:ssot

    - name: Append metrics to job summary
      run: cat metrics/code-metrics.md >> "$GITHUB_STEP_SUMMARY"

    - name: Upload metrics artifacts
      uses: actions/upload-artifact@v4
      with:
        name: code-metrics
        path: metrics/
        retention-days: 30

  react-ssot-check:
    name: React SSoT Check
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build extension sources
      run: npm run compile

    - name: Run React SSoT focused checks
      run: npm run react-ssot-check

  mcp-tests:
    name: MCP Test Lane
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build extension sources
      run: npm run compile

    - name: Run MCP focused tests
      run: npm run test:mcp

  test-all-ci:
    name: Test All CI
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check SSoT import boundary
      run: npm run check:dsl-types-ssot

    - name: Check import graph boundary
      run: npm run check:import-graph

    - name: Check non-renderer SSoT meta guard
      run: npm run check:ssot:non-renderer

    - name: Check exporter SSoT guards
      run: npm run check:ssot:exporters

    - name: Run full CI test command
      run: npm run test:all:ci

    - name: CLI coverage gate
      run: npm run test:cli-coverage:gate

    - name: Diff coverage guard (K2-3a)
      run: npm run test:diff-coverage-guard

  test:
    name: Test Suite
    permissions:
      contents: read
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Check SSoT import boundary
      run: npm run check:dsl-types-ssot

    - name: Check import graph boundary
      run: npm run check:import-graph

    - name: Check non-renderer SSoT meta guard
      run: npm run check:ssot:non-renderer

    - name: Check exporter SSoT guards
      run: npm run check:ssot:exporters
    
    - name: TypeScript strict checks (warning mode)
      if: vars.TS_STRICT_FAIL_MODE == 'false'
      run: npm run typecheck:strict:warn

    - name: TypeScript strict checks (fail mode)
      if: vars.TS_STRICT_FAIL_MODE != 'false'
      run: npm run typecheck:strict

    - name: Pretest checks (compile + lint)
      run: npm run pretest:ci

    - name: Validate sample assets
      run: npm run validate:samples:compiled

    - name: Run full CI test command with coverage
      run: npm run test:all:ci

    - name: CLI coverage gate
      run: npm run test:cli-coverage:gate
    
    - name: Upload coverage to Codecov
      if: matrix.node-version == '20.x'
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

  dsl-plan:
    name: DSL Plan (PR)
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build CLI
      run: npm run compile

    - name: Fetch base branch
      run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

    - name: Run TextUI plan summary
      run: node ./scripts/plan-pr-diff.cjs --base-ref "origin/${{ github.base_ref }}" --summary-file ".tmp-plan/summary.md" --json-file ".tmp-plan/result.json"

    - name: Publish plan summary
      run: node -e "const fs=require('fs');process.stdout.write(fs.readFileSync('.tmp-plan/summary.md','utf8'))" >> "$GITHUB_STEP_SUMMARY"

    - name: Build PR comment body
      run: |
        node -e "const fs=require('fs');const marker='<!-- textui-plan-summary -->';const body=[marker,'## TextUI DSL Plan（自動更新）','',fs.readFileSync('.tmp-plan/summary.md','utf8')].join('\n');fs.writeFileSync('.tmp-plan/pr-comment.md',body);"

    - name: Upsert PR comment
      if: always()
      uses: actions/github-script@v7
      continue-on-error: true
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- textui-plan-summary -->';
          const body = fs.readFileSync('.tmp-plan/pr-comment.md', 'utf8');
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100
          });

          const existing = comments.find(comment =>
            comment.user?.type === 'Bot' && typeof comment.body === 'string' && comment.body.includes(marker)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
          }

    - name: Upload plan artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: textui-plan-summary
        path: .tmp-plan
        retention-days: 14

  lint:
    name: Lint & Format Check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npm run lint
    
    - name: Check code formatting
      run: npm run format:check

  webview-media-drift:
    name: WebView media sync (T-002)
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Verify committed media/ matches build-webview
      run: npm run check:webview-media-drift
    # T-015: artifact commit vs build-on-CI — strategy / phased migration memo:
    # docs/current/ci-webview-artifact-strategy-t015.md

  build:
    name: Build Extension
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [code-metrics, react-ssot-check, mcp-tests, test-all-ci, test, lint, real-vscode-smoke, webview-media-drift]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # build-webview is NOT run in this job: media/ artifacts are committed; the packaged
    # .vsix uses those files. Drift vs sources is enforced by the `webview-media-drift`
    # CI job (`npm run check:webview-media-drift`). After changing webview sources, run
    # `npm run build-webview`, commit updated `media/`, and ensure that check passes locally.
    - name: Build extension
      run: npm run compile
    
    - name: Package extension
      run: npm run package
    
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: vscode-extension
        path: '*.vsix'
        retention-days: 30

  integration:
    name: Integration Tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [code-metrics, react-ssot-check, mcp-tests, test-all-ci, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Build extension sources
      run: npm run build
    
    - name: Setup Xvfb (for headless VS Code)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
    
    - name: Run integration tests
      run: xvfb-run -a npm run test:integration
      env:
        NODE_ENV: test

  real-vscode-smoke:
    name: Real VS Code Smoke
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [code-metrics, react-ssot-check, mcp-tests, test-all-ci, test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # build-webview is NOT run here: smoke uses committed media/ artifacts. Drift is
    # gated by `webview-media-drift` (see Build Extension job comment).
    - name: Build extension sources
      run: npm run compile

    - name: Setup Xvfb (for headless VS Code)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Run real VS Code smoke
      run: xvfb-run -a npm run test:vscode-smoke
      env:
        VSCODE_SMOKE_RETRIES: '4'
