page:
  id: sample-all-components
  title: "All Components Sample"
  layout: vertical
  components:
    - Text:
        variant: h1
        value: "TextUI Designer - All Components"
    - Alert:
        variant: info
        message: "This sample includes every supported component."
    - Badge:
        label: "サンプル"
        variant: "primary"
    - Badge:
        label: "チップ"
        variant: "default"
    - Text:
        variant: h3
        value: "Languages"
    - Progress:
        label: "TypeScript"
        value: 66.8
        variant: primary
    - Progress:
        label: "JavaScript"
        value: 21.4
        variant: warning
    - Progress:
        label: "CSS"
        value: 11.8
        variant: success
    - Divider:
        orientation: horizontal
    - Spacer:
        axis: vertical
        size: md
    - Container:
        layout: horizontal
        components:
          - Input:
              label: "Name"
              name: "name"
              type: text
              placeholder: "Jane Doe"
              required: true
          - DatePicker:
              label: "Birthday"
              name: "birthday"
              min: "1900-01-01"
              max: "2100-12-31"
    - Form:
        id: "all-components-form"
        fields:
          - Input:
              label: "Email"
              name: "email"
              type: email
              required: true
          - Select:
              label: "Country"
              name: "country"
              options:
                - label: "Japan"
                  value: "jp"
                - label: "United States"
                  value: "us"
                - label: "United Kingdom"
                  value: "uk"
          - Radio:
              label: "Plan"
              name: "plan"
              options:
                - label: "Basic"
                  value: "basic"
                - label: "Pro"
                  value: "pro"
          - Checkbox:
              label: "Agree to terms"
              name: "agree"
        actions:
          - Button:
              label: "Submit"
              kind: submit
              submit: true
          - Button:
              label: "Cancel"
              kind: secondary
    - Tabs:
        defaultTab: 0
        items:
          - label: "Overview"
            components:
              - Text:
                  variant: h2
                  value: "Overview Tab"
              - Table:
                  columns:
                    - key: "name"
                      header: "Name"
                    - key: "role"
                      header: "Role"
                  rows:
                    - name: "Alice"
                      role: "Admin"
                    - name: "Bob"
                      role: "Editor"
          - label: "Structure"
            components:
              - TreeView:
                  showLines: true
                  items:
                    - label: "src"
                      expanded: true
                      children:
                        - label: "extension.ts"
                        - label: "renderer"
                          children:
                            - label: "App.tsx"
                    - label: "README.md"
    - Image:
        src: "https://picsum.photos/240/120"
        alt: "Sample image"
        width: "240px"
        height: "120px"
    - Accordion:
        allowMultiple: true
        items:
          - title: "What is this?"
            components:
              - Text:
                  variant: p
                  value: "A complete DSL example using all supported components."
          - title: "Can I customize it?"
            components:
              - Text:
                  variant: p
                  value: "Yes. Replace labels, options, and layouts to match your app."
