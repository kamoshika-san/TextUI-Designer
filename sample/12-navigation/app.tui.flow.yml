flow:
  id: checkout-flow
  title: Checkout Flow
  entry: cart
  screens:
    - id: cart
      page: ./screens/cart.tui.yml
      title: Cart
    - id: shipping
      page: ./screens/shipping.tui.yml
      title: Shipping
    - id: confirm
      page: ./screens/confirm.tui.yml
      title: Confirm
  transitions:
    - from: cart
      to: shipping
      trigger: next
      label: Continue to Shipping
    - from: shipping
      to: confirm
      trigger: next
      label: Review Order
