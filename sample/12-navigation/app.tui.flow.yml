flow:
  id: checkout-flow
  title: Checkout Flow
  entry: cart
  screens:
    - id: cart
      page: ./screens/cart.tui.yml
      title: Cart
    - id: shipping
      page: ./screens/shipping.tui.yml
      title: Shipping
    - id: confirm
      page: ./screens/confirm.tui.yml
      title: Confirm
    - id: done
      title: Order Complete
      terminal:
        kind: success
  transitions:
    - from: cart
      to: shipping
      trigger: proceed-to-shipping
      label: Continue to Shipping
    - from: shipping
      to: confirm
      trigger: proceed-to-confirm
      label: Review Order
    - from: confirm
      to: done
      trigger: submit
      label: Place Order
