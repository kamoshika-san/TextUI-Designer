page:
  id: form-sample-v2
  title: "User Registration Form - Version 2"
  layout: vertical
  components:
    - Text:
        variant: h1
        value: "User Registration"
    - Text:
        variant: p
        value: "Please complete the registration form with your details."
    - Input:
        label: "Full Name"
        name: "fullName"
        type: text
        placeholder: "Enter your full name"
        required: true
    - Input:
        label: "Email Address"
        name: "email"
        type: email
        placeholder: "Enter your email"
        required: true
    - Input:
        label: "Phone Number"
        name: "phone"
        type: text
        placeholder: "Enter your phone number"
    - Input:
        label: "Password"
        name: "password"
        type: password
        placeholder: "Enter a password"
        required: true
    - DatePicker:
        label: "Date of Birth"
        name: "dob"
        min: "1900-01-01"
        required: true
    - Button:
        label: "Submit Registration"
        kind: primary