# GitHub リポジトリページ風デザイントークン（08-github 用）
# このフォルダで sample.tui.yml を開くとこのテーマが利用可能です。
theme:
  name: "GitHub Theme"
  version: "1.0.0"
  description: "GitHub のライトテーマに寄せたデザイントークン"
  author: "TextUI Designer Team"

  tokens:
    color:
      primary: "#238636"
      secondary: "#f6f8fa"
      success: "#1a7f37"
      warning: "#9a6700"
      error: "#cf222e"
      info: "#0969da"
      surface: "#f6f8fa"
      background: "#ffffff"
      text:
        primary: "#1f2328"
        secondary: "#656d76"
        muted: "#8c959f"
        inverse: "#ffffff"
        link: "#0969da"
        dark: "#1f2328"
      border:
        default: "#d0d7de"
        focus: "#0969da"
        error: "#cf222e"

    spacing:
      xs: "0.25rem"
      sm: "0.5rem"
      md: "0.75rem"
      lg: "1rem"
      xl: "1.25rem"
      "2xl": "1.5rem"

    typography:
      fontFamily:
        primary: "-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif"
        monospace: "ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
      fontSize:
        xs: "0.75rem"
        sm: "0.875rem"
        base: "1rem"
        lg: "1.125rem"
        xl: "1.25rem"
        "2xl": "1.25rem"
        "3xl": "1.5rem"
        "4xl": "2rem"

    borderRadius:
      sm: "0.375rem"
      md: "0.375rem"
      lg: "0.5rem"
      xl: "0.5rem"

  components:
    image:
      default: {}
      avatar:
        borderRadius: "50%"
        objectFit: "cover"

    badge:
      default:
        backgroundColor: "#ddf4ff"
        color: "#0969da"
        padding: "0.125rem 0.5rem"
        borderRadius: "1.25rem"
        fontSize: "0.75rem"
        fontWeight: "500"

    button:
      primary:
        backgroundColor: "#238636"
        color: "#ffffff"
        padding: "0.375rem 1rem"
        borderRadius: "0.375rem"
        border: "1px solid rgba(31,35,40,0.15)"
        fontSize: "0.875rem"
        fontWeight: "500"
      primary-hover:
        backgroundColor: "#2ea043"
      secondary:
        backgroundColor: "#f6f8fa"
        color: "#1f2328"
        padding: "0.375rem 1rem"
        borderRadius: "0.375rem"
        border: "1px solid #d0d7de"
        fontSize: "0.875rem"
        fontWeight: "500"
      secondary-hover:
        backgroundColor: "#eaeef2"
        borderColor: "#afb8c1"
      submit:
        backgroundColor: "#238636"
        color: "#ffffff"
        padding: "0.375rem 1rem"
        borderRadius: "0.375rem"
        border: "1px solid rgba(31,35,40,0.15)"
        fontSize: "0.875rem"
        fontWeight: "500"

    text:
      h1:
        color: "#1f2328"
        fontSize: "2rem"
        fontWeight: "600"
      h2:
        color: "#1f2328"
        fontSize: "1.5rem"
        fontWeight: "600"
      h3:
        color: "#1f2328"
        fontSize: "1.25rem"
        fontWeight: "600"
      p:
        color: "#656d76"
        fontSize: "0.875rem"
      small:
        color: "#8c959f"
        fontSize: "0.75rem"
