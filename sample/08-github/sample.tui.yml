# GitHub リポジトリトップページのサンプルを templates モジュールで構成
page:
  id: github-repo-top
  title: "GitHub - kamoshika-san/TextUI-Designer"
  layout: vertical
  components:
    - $include:
        template: "./templates/header.template.yml"
    - Container:
        layout: horizontal
        components:
          - $include:
              template: "./templates/main-left.template.yml"
          - $include:
              template: "./templates/sidebar.template.yml"
    - $include:
        template: "./templates/footer.template.yml"
