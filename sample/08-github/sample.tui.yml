# GitHub リポジトリトップページ風サンプル（添付画像に近い構成）
# プレビューで「GitHub Theme」を選択すると見た目が GitHub に近づきます。
page:
  id: github-repo-top
  title: "GitHub - kamoshika-san/TextUI-Designer"
  layout: vertical
  components:
    # ヘッダー: リポジトリ名・説明（画像の kamoshika-san / TextUI-Designer）
    - Container:
        layout: vertical
        token: color.background
        components:
          - Link:
              href: "https://github.com/kamoshika-san/TextUI-Designer"
              label: "kamoshika-san / TextUI-Designer"
              target: "_blank"
              token: color.text.link
          - Text:
              variant: p
              value: "VS Code extension for designing text-based UIs with YAML/JSON DSL."
              token: color.text.secondary
    - Divider:
        orientation: horizontal
        token: color.border.default
    # Watch / Star / Fork
    - Container:
        layout: horizontal
        components:
          - Button:
              kind: secondary
              label: "Watch"
              token: color.secondary
          - Button:
              kind: secondary
              label: "Star"
              token: color.secondary
          - Button:
              kind: secondary
              label: "Fork"
              token: color.secondary
    - Spacer:
        axis: vertical
        size: md
    # メイン＋右サイドバー（画像の2カラムレイアウト）
    - Container:
        layout: horizontal
        components:
          # 左: タブ＋コンテンツ（メイン領域 70% 相当）
          - Container:
              layout: vertical
              flexGrow: 7
              components:
                - Tabs:
                    defaultTab: 0
                    items:
                      - label: "Code"
                        components:
                          - Container:
                              layout: horizontal
                              components:
                                - Select:
                                    name: branchCode
                                    token: color.border.default
                                    options:
                                      - label: "main"
                                        value: "main"
                                - Button:
                                    kind: secondary
                                    label: "Go to file"
                                    token: color.secondary
                                - Button:
                                    kind: secondary
                                    label: "Add file"
                                    token: color.secondary
                                - Button:
                                    kind: primary
                                    label: "Code"
                                    token: color.primary
                          - Divider:
                              token: color.border.default
                          # ファイル一覧（画像のテーブル形式）
                          - Table:
                              token: color.border.default
                              columns:
                                - key: name
                                  header: "Name"
                                  width: "50%"
                                - key: lastCommit
                                  header: "Last commit"
                                  width: "35%"
                                - key: updated
                                  header: "Updated"
                                  width: "15%"
                              rows:
                                - name: ".github"
                                  lastCommit: "Updated workflows"
                                  updated: "2 months ago"
                                - name: "docs"
                                  lastCommit: "Updated docs"
                                  updated: "2 months ago"
                                - name: "media"
                                  lastCommit: "Update assets"
                                  updated: "1 month ago"
                                - name: "sample"
                                  lastCommit: "Add sample 08 github"
                                  updated: "1 week ago"
                                - name: "src"
                                  lastCommit: "Refactor exporters"
                                  updated: "3 days ago"
                                - name: "tests"
                                  lastCommit: "Add regression tests"
                                  updated: "1 month ago"
                                - name: "AGENTS.md"
                                  lastCommit: "Update AGENTS"
                                  updated: "2 months ago"
                                - name: "package.json"
                                  lastCommit: "Bump deps"
                                  updated: "2 months ago"
                                - name: "README.md"
                                  lastCommit: "Update README"
                                  updated: "2 months ago"
                          - Divider:
                              token: color.border.default
                          # README.md 本文（画像の構成に合わせる）
                          - Text:
                              variant: h3
                              value: "README.md"
                              token: color.text.primary
                          - Text:
                              variant: h1
                              value: "TextUI Designer"
                              token: color.text.primary
                          - Text:
                              variant: p
                              value: "YAML / JSON ベースの DSL で UI を設計し、VS Code 上でライブプレビューしながら開発できる拡張機能です。「UI をコードレビューしやすいテキストとして管理したい」「実装前に画面構成を素早く固めたい」ケースに向いています。"
                              token: color.text.secondary
                          - Text:
                              variant: h3
                              value: "プロジェクト概要"
                              token: color.text.primary
                          - Text:
                              variant: p
                              value: "TextUI Designerは、YAML/JSONベースのDSLでUIを設計するVS Code拡張機能。単一リポジトリ（モノレポではない）。外部サービス・Docker・DB依存なし。"
                              token: color.text.secondary
                          - Text:
                              variant: h3
                              value: "開発コマンド"
                              token: color.text.primary
                          - Table:
                              token: color.border.default
                              columns:
                                - key: command
                                  header: "コマンド"
                                - key: purpose
                                  header: "用途"
                              rows:
                                - command: "npm run compile"
                                  purpose: "TypeScriptコンパイル（src/ → out/）"
                                - command: "npm run build-webview"
                                  purpose: "Vite でWebViewをビルド（media/に出力）"
                                - command: "npm run lint"
                                  purpose: "ESLint実行"
                                - command: "npm test"
                                  purpose: "ユニットテスト"
                                - command: "npm run test:all"
                                  purpose: "全テスト（unit → integration → e2e → regression）"
                          - Text:
                              variant: h3
                              value: "テストに関する注意点"
                              token: color.text.primary
                          - Text:
                              variant: p
                              value: "テストは vscode モジュールをモック化して実行。VS Code実行環境は不要。npm run test:all で全件パスを確認。"
                              token: color.text.secondary
                          - Text:
                              variant: h3
                              value: "WebViewビルドについて"
                              token: color.text.primary
                          - Text:
                              variant: p
                              value: "npm run build-webview で media/ にWebViewアセットが生成される。ソースは src/renderer/ にあり、Vite + React + Tailwind CSS でビルド。"
                              token: color.text.secondary
                          - Text:
                              variant: h3
                              value: "ライセンス"
                              token: color.text.primary
                          - Text:
                              variant: p
                              value: "MIT"
                              token: color.text.secondary
                      - label: "Issues"
                        components:
                          - Container:
                              layout: horizontal
                              components:
                                - Button:
                                    kind: primary
                                    label: "New issue"
                                    token: color.primary
                          - Table:
                              token: color.border.default
                              columns:
                                - key: title
                                  header: "Title"
                                - key: author
                                  header: "Author"
                                - key: labels
                                  header: "Labels"
                                - key: updated
                                  header: "Updated"
                              rows:
                                - title: "Fix typo in README"
                                  author: "kamoshika-san"
                                  labels: "documentation"
                                  updated: "2 days ago"
                                - title: "Add sample 08 github"
                                  author: "kamoshika-san"
                                  labels: "enhancement"
                                  updated: "1 week ago"
                      - label: "Pull requests"
                        components:
                          - Container:
                              layout: horizontal
                              components:
                                - Button:
                                    kind: primary
                                    label: "New pull request"
                                    token: color.primary
                          - Text:
                              variant: p
                              value: "No open pull requests."
                              token: color.text.secondary
                      - label: "Actions"
                        components:
                          - Text:
                              variant: p
                              value: "No workflow runs yet."
                              token: color.text.secondary
                      - label: "Projects"
                        components:
                          - Text:
                              variant: p
                              value: "No projects yet."
                              token: color.text.secondary
                      - label: "Wiki"
                        components:
                          - Text:
                              variant: p
                              value: "Wiki is disabled."
                              token: color.text.secondary
                      - label: "Security"
                        components:
                          - Text:
                              variant: p
                              value: "Security policy and advisories."
                              token: color.text.secondary
                      - label: "Insights"
                        components:
                          - Text:
                              variant: p
                              value: "Pulse, Contributors, Community."
                              token: color.text.secondary
                      - label: "Settings"
                        components:
                          - Text:
                              variant: p
                              value: "Repository settings."
                              token: color.text.secondary
          # 右サイドバー（画像の About / Releases / Packages / Languages）（約 30% 相当）
          - Container:
              layout: vertical
              flexGrow: 3
              token: color.background
              components:
                - Text:
                    variant: h3
                    value: "About"
                    token: color.text.primary
                - Text:
                    variant: p
                    value: "VS Code extension for designing text-based UIs with YAML/JSON DSL."
                    token: color.text.secondary
                - Link:
                    href: "https://github.com/kamoshika-san/TextUI-Designer"
                    label: "Repository"
                    target: "_blank"
                    token: color.text.link
                - Container:
                    layout: horizontal
                    components:
                      - Badge:
                          label: "react"
                          variant: default
                          size: sm
                          token: color.secondary
                      - Badge:
                          label: "tailwind"
                          variant: default
                          size: sm
                          token: color.secondary
                      - Badge:
                          label: "vscode-extension"
                          variant: default
                          size: sm
                          token: color.secondary
                      - Badge:
                          label: "yaml"
                          variant: default
                          size: sm
                          token: color.secondary
                - Divider:
                    token: color.border.default
                - Text:
                    variant: h3
                    value: "Releases"
                    token: color.text.primary
                - Text:
                    variant: p
                    value: "No releases published"
                    token: color.text.secondary
                - Divider:
                    token: color.border.default
                - Text:
                    variant: h3
                    value: "Packages"
                    token: color.text.primary
                - Text:
                    variant: p
                    value: "No packages published"
                    token: color.text.secondary
                - Divider:
                    token: color.border.default
                - Text:
                    variant: h3
                    value: "Languages"
                    token: color.text.primary
                - Progress:
                    label: "TypeScript"
                    value: 66.8
                    showValue: true
                    variant: primary
                    token: color.primary
                - Progress:
                    label: "CSS"
                    value: 19.1
                    showValue: true
                    variant: primary
                    token: color.primary
                - Progress:
                    label: "JavaScript"
                    value: 13.9
                    showValue: true
                    variant: primary
                    token: color.primary
                - Progress:
                    label: "Shell"
                    value: 0.2
                    showValue: true
                    variant: primary
                    token: color.primary
                - Divider:
                    token: color.border.default
                - Text:
                    variant: h3
                    value: "Contributors"
                    token: color.text.primary
                - Container:
                    layout: horizontal
                    components:
                      - Image:
                          src: "https://github.com/kamoshika-san.png"
                          alt: "kamoshika-san"
                          width: "32px"
                          height: "32px"
                          variant: avatar
                          token: color.border.default
                      - Text:
                          variant: p
                          value: "1 contributor"
                          token: color.text.secondary
    - Divider:
        token: color.border.default
    - Container:
        layout: horizontal
        components:
          - Text:
              variant: small
              value: "© 2026 "
              token: color.text.muted
          - Link:
              href: "https://github.com/kamoshika-san"
              label: "kamoshika-san"
              target: "_blank"
              token: color.text.link
          - Text:
              variant: small
              value: ". GitHub repository top page sample."
              token: color.text.muted
